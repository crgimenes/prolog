name: test

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - name: Test
        run: go test -count=1 -timeout 300s ./...
      # Race detector on Linux amd64, where cgo for -race is available by default.
      - name: Test (race)
        if: matrix.os == 'ubuntu-latest'
        run: go test -race -count=1 -timeout 400s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Short smoke fuzz on the parser/compiler pipeline — the most exposed
      # surface for untrusted input. Bounded so the job can't hang.
      - name: Fuzz Exec
        run: go test -run '^$' -fuzz '^FuzzExecDoesNotPanic$' -fuzztime 60s .
